apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: f2-mon-s-loki
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-degraded.slack: f2-alerts
    argocd.argoproj.io/apply-method: server-side
spec:
  project: default
  source:
    repoURL: https://github.com/ZombiePm/f2-monitoring.git
    targetRevision: main
    path: .
    directory:
      include: '{grafana-datasource-s-loki.yaml,grafana-dashboards-config.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: s-loki-credentials
      namespace: monitoring
      jsonPointers:
        - /metadata/labels
    - group: ""
      kind: ConfigMap
      name: s-loki-datasource
      namespace: monitoring
      jsonPointers:
        - /metadata/labels
    - group: ""
      kind: ConfigMap
      name: s-loki-dashboards
      namespace: monitoring
      jsonPointers:
        - /metadata/labels
